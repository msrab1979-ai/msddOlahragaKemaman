<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Awal — MSSD Merentas Desa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-xl shadow-lg w-full max-w-md p-8">
  <div class="text-center mb-6">
    <div class="text-3xl mb-2">⚙️</div>
    <h1 class="text-xl font-bold text-gray-800">Setup Awal Sistem</h1>
    <p class="text-sm text-gray-500 mt-1">Buat akaun admin + data asas Firestore</p>
    <div class="mt-2 bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-2 text-xs text-yellow-700">
      ⚠️ Padam halaman ini selepas setup selesai
    </div>
  </div>

  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nama Admin</label>
      <input id="nama" type="text" value="Admin MSSD Kemaman"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email Admin</label>
      <input id="email" type="email" value="msrab1979@gmail.com"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Kata Laluan Admin</label>
      <input id="password" type="text" placeholder="Masukkan kata laluan"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p class="text-xs text-gray-400 mt-1">Ini kata laluan untuk log masuk admin</p>
    </div>

    <button onclick="doSetup()"
      class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition text-sm">
      Mulakan Setup
    </button>
  </div>

  <div id="log" class="mt-6 space-y-1 hidden"></div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'

  const firebaseConfig = {
    apiKey:            "AIzaSyDcyYZaaLJbUcSGbKqv0eZ_EMb0Mimv6Gk",
    authDomain:        "mssdkemaman-merentasdesa.firebaseapp.com",
    projectId:         "mssdkemaman-merentasdesa",
    storageBucket:     "mssdkemaman-merentasdesa.firebasestorage.app",
    messagingSenderId: "997720090390",
    appId:             "1:997720090390:web:60ee0a3b984002f9959237"
  }

  const app = initializeApp(firebaseConfig)
  const db  = getFirestore(app)

  function log(msg, ok = true) {
    const el = document.getElementById('log')
    el.classList.remove('hidden')
    const row = document.createElement('div')
    row.className = `text-sm px-3 py-1.5 rounded-lg ${ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`
    row.textContent = (ok ? '✓ ' : '✗ ') + msg
    el.appendChild(row)
  }

  window.doSetup = async () => {
    const nama     = document.getElementById('nama').value.trim()
    const email    = document.getElementById('email').value.trim().toLowerCase()
    const password = document.getElementById('password').value.trim()

    if (!nama || !email || !password) {
      alert('Sila isi semua maklumat.')
      return
    }

    document.getElementById('log').innerHTML = ''
    document.getElementById('log').classList.remove('hidden')

    try {
      // 1. Admin user
      const adminId = 'admin_mssd_kemaman'
      const adminRef = doc(db, 'users', adminId)
      const existing = await getDoc(adminRef)
      if (existing.exists()) {
        log('Admin sudah wujud — kemaskini kata laluan sahaja')
        await setDoc(adminRef, { password, updatedAt: serverTimestamp() }, { merge: true })
        log('Kata laluan admin dikemaskini')
      } else {
        await setDoc(adminRef, {
          uid:       adminId,
          nama,
          email,
          password,
          role:      'admin',
          aktif:     true,
          createdAt: serverTimestamp(),
        })
        log('Akaun admin berjaya dibuat')
      }

      // 2. Settings asas
      const settingsRef = doc(db, 'settings', 'main')
      const settingsSnap = await getDoc(settingsRef)
      if (!settingsSnap.exists()) {
        await setDoc(settingsRef, {
          namaKejohanan:   'Merentas Desa MSSD Kemaman 2026',
          namaPenganjur:   'Majlis Sukan Sekolah Daerah Kemaman',
          tarikh:          '',
          tempat:          '',
          thresholdTanpaMasa: 20,
          aktif:           true,
          createdAt:       serverTimestamp(),
        })
        log('Settings asas berjaya dibuat')
      } else {
        log('Settings sudah wujud — tidak diubah')
      }

      log('─────────────────────────────────')
      log(`Setup selesai! Log masuk: ${email}`)

      document.querySelector('button[onclick="doSetup()"]').textContent = '✓ Setup Selesai'
      document.querySelector('button[onclick="doSetup()"]').disabled = true
      document.querySelector('button[onclick="doSetup()"]').className =
        'w-full bg-green-600 text-white font-semibold py-2.5 rounded-lg text-sm cursor-not-allowed'

    } catch (err) {
      log('RALAT: ' + err.message, false)
      console.error(err)
    }
  }
</script>
</body>
</html>
